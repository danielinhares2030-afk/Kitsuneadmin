<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kitsune Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8 font-sans">

  <h1 class="text-3xl font-black italic text-red-500 mb-8 border-b border-gray-800 pb-4">Kitsune Manga - Administrador</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
      <h2 class="text-xl font-bold mb-6 text-white"><i class="fa-solid fa-book-open mr-2"></i> Adicionar Mangá</h2>
      <form id="addMangaForm" class="space-y-4">
        <input type="text" id="mangaTitle" placeholder="Título" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500" required>
        <input type="url" id="mangaImg" placeholder="URL da Capa (Imagem WebP recomendada)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500" required>
        <div class="flex gap-4">
          <select id="mangaType" class="flex-1 bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none">
            <option value="Mangá">Mangá</option><option value="Manhwa">Manhwa</option><option value="Manhua">Manhua</option><option value="Comic">Comic</option>
          </select>
          <select id="mangaStatus" class="flex-1 bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none">
            <option value="Lançamento">Lançamento</option><option value="Completo">Completo</option><option value="Hiato">Hiato</option>
          </select>
        </div>
        <input type="text" id="mangaGenres" placeholder="Géneros (separados por vírgula)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500">
        <textarea id="mangaSynopsis" placeholder="Sinopse..." rows="4" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500" required></textarea>
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition-colors">Salvar Mangá</button>
      </form>
    </div>

    <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
      <h2 class="text-xl font-bold mb-6 text-white"><i class="fa-solid fa-file-image mr-2"></i> Adicionar Capítulo</h2>
      <form id="addChapterForm" class="space-y-4">
        <select id="selectManga" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500" required>
          <option value="">Selecione um Mangá...</option>
        </select>
        <div class="flex gap-4">
           <input type="number" id="chapterNum" placeholder="Nº Capítulo" class="flex-1 bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none" required>
           <input type="text" id="chapterTitle" placeholder="Título (Opcional)" class="flex-1 bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none">
        </div>
        <textarea id="chapterPages" placeholder="URLs das Imagens (uma por linha)" rows="6" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-red-500" required></textarea>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors">Salvar Capítulo</button>
      </form>
    </div>

  </div>

  <script>
    // Inicialização do Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyBqNGWOodlE-DRmA6Pbdn-IvnrZo2dkYuc",
      authDomain: "kitsuneapp-2f5d8.firebaseapp.com",
      projectId: "kitsuneapp-2f5d8",
    });
    const db = firebase.firestore();
    const CORE_ID = "kitsune-core-v1";
    let mangasRef = db.collection('artifacts').doc(CORE_ID).collection('public').doc('data').collection('mangas');

    // Carregar Mangás no Dropdown
    mangasRef.onSnapshot((snap) => {
      const select = document.getElementById('selectManga');
      select.innerHTML = '<option value="">Selecione um Mangá...</option>';
      snap.forEach(doc => {
        select.innerHTML += `<option value="${doc.id}">${doc.data().title}</option>`;
      });
    });

    // Salvar Mangá
    document.getElementById('addMangaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button'); btn.innerText = "A salvar...";
      try {
        const genresArray = document.getElementById('mangaGenres').value.split(',').map(s => s.trim()).filter(Boolean);
        await mangasRef.add({
          title: document.getElementById('mangaTitle').value,
          img: document.getElementById('mangaImg').value,
          type: document.getElementById('mangaType').value,
          status: document.getElementById('mangaStatus').value,
          sinopse: document.getElementById('mangaSynopsis').value,
          genres: genresArray,
          rating: "5.0", views: 0, cap: "0",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Mangá Adicionado!"); e.target.reset();
      } catch(err) { alert("Erro: " + err.message); }
      btn.innerText = "Salvar Mangá";
    });

    // Salvar Capítulo
    document.getElementById('addChapterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button'); btn.innerText = "A salvar...";
      try {
        const mangaId = document.getElementById('selectManga').value;
        const num = document.getElementById('chapterNum').value;
        const paginas = document.getElementById('chapterPages').value.split('\n').map(s => s.trim()).filter(Boolean);
        
        // Guarda as páginas do capitulo
        await mangasRef.doc(mangaId).collection('capitulos').add({
          numero: num,
          titulo: document.getElementById('chapterTitle').value,
          paginas: paginas,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        // Atualiza o nº do capítulo mais recente na obra principal
        await mangasRef.doc(mangaId).update({ cap: num });
        
        alert("Capítulo Adicionado!"); e.target.reset();
      } catch(err) { alert("Erro: " + err.message); }
      btn.innerText = "Salvar Capítulo";
    });
  </script>
</body>
</html>
